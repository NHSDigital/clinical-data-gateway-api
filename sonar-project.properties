# SonarCloud configuration
# Note: sonar.organization and sonar.projectKey are set via GitHub Action parameters

sonar.host.url=https://sonarcloud.io
sonar.qualitygate.wait=true
sonar.sourceEncoding=UTF-8

# Source and test directories
sonar.sources=gateway-api
sonar.tests=gateway-api/tests,gateway-api/features

# Python coverage report path (set dynamically via GitHub Action)
# sonar.python.coverage.reportPaths will be passed as a command line argument
