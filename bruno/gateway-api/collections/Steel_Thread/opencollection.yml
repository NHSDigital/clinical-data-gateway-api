opencollection: 1.0.0

info:
  name: Steel Thread
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Ssp-TraceID
      value: "{{$guid}}"
    - name: ODS-from
      value: "{{from_ods}}"
  auth:
    type: oauth2
    flow: authorization_code
    authorizationUrl: https://internal-dev.api.service.nhs.uk/oauth2-mock/authorize
    accessTokenUrl: https://internal-dev.api.service.nhs.uk/oauth2-mock/token
    callbackUrl: https://www.example.com/callback
    credentials:
      clientId: "{{process.env.CLIENT_ID}}"
      clientSecret: "{{process.env.CLIENT_SECRET}}"
      placement: body
    state: "{{$guid}}"
    pkce:
      disabled: true
    tokenConfig:
      id: Mock Auth Token
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false

docs:
  content: |-
    # [Authentication with the NHSE mock authorisation service](https://digital.nhs.uk/developer/guides-and-documentation/security-and-authorisation/testing-apis-with-our-mock-authorisation-service)

      | User        | UID   | National RBAC job roles      | Authenticator assurance level |
      |-------------|-------|------------------------------|------------------------------|
      | 656005750108| R0260 | General Medical Practitioner | AAL3                         |
      | 656005750107| R8000 | Clinical Practitioner        | AAL3                         |
      | 656005750111| R0260 | General Medical Practitioner | AAL2                         |
      | 656005750109| R8000 | Clinical Practitioner        | AAL2                         |

    It is recommended to use 656005750107 because it only has one associated role. For users with multiple roles you will need to the NHSD-Session-URID and NHSD-Session-UUID headers. See the APIM userinfo endpoint to find role ids for any particular user.
  type: text/markdown
bundled: false
extensions: {}
