x-nhsd-apim:
  monitoring: true
  access:
  - title: User Restricted
    grants:
      nhs-cis2-aal3: []
  target:
    type: external
    healthcheck: /health
    url: <preview-endpoint-url>
    security:
      type: mtls
      secret: <replace-with-secret-name>
    target-identity:
      - name: cis2-uuid
      - name: cis2-urid
      - name: cis2-acr
      - name: id-token
